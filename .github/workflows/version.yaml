name: Auto Version Bump

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest

    # Skip if the push was made by this workflow (prevent infinite loop)
    # Also skip when head_commit is null (multi-commit pushes)
    if: github.event.head_commit != null && !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump from commits
        id: bump
        run: |
          # Get commit messages since last version tag (or all if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"

          while IFS= read -r msg; do
            # Major: breaking change (feat!:, fix!:, or BREAKING CHANGE in body)
            if echo "$msg" | grep -qE '^[a-z]+!(\(.+\))?:'; then
              BUMP="major"
              break
            fi

            # Minor: feat
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi

            # Patch: fix, refactor, perf
            if echo "$msg" | grep -qE '^(fix|refactor|perf)(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Determined bump: $BUMP"

      - name: Bump version in package.json
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"
          CURRENT=$(node -p "require('./package.json').version")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION ($BUMP)"

          # Update package.json version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git add package.json
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push
          git push --tags
